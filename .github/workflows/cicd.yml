name: CI

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Print Hello

        run: echo "Hello GitHub Actions"

      - name: List files

        run: ls -la

      - uses: actions/setup-python@v5

        with:
             python-version: "3.12"

      - run: python app.py
